name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  preflight:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python3 -m ruff check .

      - name: Type-check (mypy)
        run: mypy app/ mcp_server/

      - name: Test (pytest)
        run: pytest -q

      # The vendored Feature Factory / review-lens engine has its own test suite
      # under docs/workflow/operations/codex-skills/. It is NOT covered by the
      # app's `pytest -q` (testpaths = ["tests"]). These tests import their sibling
      # scripts once (import-once), so the whole suite is order-independent and
      # runs in a single process. A guardrail test (test_no_sys_modules_reload)
      # fails if a test file reintroduces a sys.modules reload — which is what
      # used to force the old per-file-isolation runs.
      - name: Test (Feature Factory engine)
        run: python -m pytest docs/workflow/operations/codex-skills -q
