name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  preflight:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python3 -m ruff check .

      - name: Type-check (mypy)
        run: mypy app/ mcp_server/

      - name: Test (pytest)
        run: pytest -q

      # The vendored Feature Factory / review-lens engine has its own test suite
      # under docs/workflow/operations/codex-skills/. It is NOT covered by the
      # app's `pytest -q` (testpaths = ["tests"]). Each test module importlib-loads
      # its sibling scripts under canonical names, which collide across files in a
      # single process, so we run each file in its own process for isolation.
      # (Removing that per-file requirement is a separate engine-test refactor.)
      - name: Test (Feature Factory engine, per-file isolation)
        run: |
          fail=0
          for f in $(find docs/workflow/operations/codex-skills -name 'test_*.py' | sort); do
            python -m pytest "$f" -q || fail=1
          done
          exit $fail
