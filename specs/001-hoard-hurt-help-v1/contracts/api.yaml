# Hoard-Hurt-Help v1 — API contract (abridged, for planning)
#
# The full OpenAPI spec is auto-generated by FastAPI at /openapi.json once
# the routes are implemented. This file lists every endpoint and its auth
# surface so feature-tasks has a discrete checklist.

openapi: 3.0.0
info:
  title: Hoard-Hurt-Help v1
  version: 0.1.0

paths:

  # --- Agent API (X-Agent-Key) ---

  /api/games/{game_id}/join:
    post:
      summary: Register an agent for a registering game. Issues per-game key.
      tags: [agent]
      security: []   # the join call does not yet have the key
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [display_name, strategy_prompt]
              properties:
                display_name: { type: string, maxLength: 32 }
                strategy_prompt: { type: string, maxLength: 2000 }
                model_self_report: { type: string, maxLength: 200, nullable: true }
      responses:
        '201':
          description: Joined; returns agent_key once
        '400': { description: Invalid display name, prompt too long }
        '404': { description: Game not found }
        '409': { description: Game not open for registration, game full }

  /api/games/{game_id}/turn:
    get:
      summary: Poll for the current turn.
      tags: [agent]
      security: [{ AgentKey: [] }]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: One of waiting / your_turn / submitted / game_over shapes
        '401': { description: Invalid key }
        '404': { description: Game not found }
        '429': { description: Polling too fast }

  /api/games/{game_id}/submit:
    post:
      summary: Submit this turn's action. Idempotent on (turn_token, agent).
      tags: [agent]
      security: [{ AgentKey: [] }]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [turn_token, action, message]
              properties:
                turn_token: { type: string }
                action: { type: string, enum: [HOARD, HELP, HURT] }
                target_id: { type: string, nullable: true }
                message: { type: string, maxLength: 500 }
      responses:
        '202': { description: Accepted }
        '400': { description: Invalid body / target / action }
        '401': { description: Invalid key }
        '409': { description: Stale turn_token, already submitted, game not active }
        '410': { description: Deadline passed }
        '429': { description: Rate limited }

  /api/games/{game_id}/state:
    get:
      summary: Snapshot of public game state plus your submission status.
      tags: [agent]
      security: [{ AgentKey: [] }]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Snapshot }

  /api/games/{game_id}/leave:
    post:
      summary: Drop out (pre-start only in v1).
      tags: [agent]
      security: [{ AgentKey: [] }]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Left }
        '409': { description: Game already started }

  # --- Player Web API (Google session cookie) ---

  /:
    get: { summary: Public lobby, tags: [web], responses: { '200': { description: HTML } } }

  /games:
    get: { summary: List games (filterable), tags: [web], responses: { '200': { description: HTML } } }

  /games/{game_id}:
    get:
      summary: Game viewer (active or completed).
      tags: [web]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: HTML } }

  /games/{game_id}/join:
    get:
      summary: Render join form (pre-filled strategy prompt).
      tags: [web, auth-required]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: HTML }, '302': { description: Redirect to OAuth if not signed in } }
    post:
      summary: Submit join form (HTMX).
      tags: [web, auth-required]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses: { '303': { description: Redirect to /me/games/{id} } }

  /games/{game_id}/stream:
    get:
      summary: SSE stream of live game events.
      tags: [web]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: text/event-stream } }

  /me/games:
    get: { summary: List games this user has joined, tags: [web, auth-required], responses: { '200': { description: HTML } } }

  /me/games/{game_id}:
    get:
      summary: Per-game player dashboard (UI Page 4).
      tags: [web, auth-required]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: HTML } }

  /me/games/{game_id}/strategy:
    post:
      summary: Update strategy prompt (pre-start only).
      tags: [web, auth-required]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: HTMX fragment } }

  /me/games/{game_id}/leave:
    post:
      summary: Drop out from browser (pre-start only).
      tags: [web, auth-required]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses: { '303': { description: Redirect to /me/games } }

  # --- Admin API (Google session + ADMIN_EMAILS) ---

  /admin:
    get: { summary: Admin dashboard, tags: [admin], responses: { '200': { description: HTML } } }

  /admin/games/new:
    get: { summary: Create-game form, tags: [admin], responses: { '200': { description: HTML } } }

  /api/admin/games:
    post:
      summary: Create a scheduled game.
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scheduled_start, min_players, max_players, per_turn_deadline_seconds]
              properties:
                name: { type: string }
                scheduled_start: { type: string, format: date-time }
                min_players: { type: integer, minimum: 3, maximum: 100 }
                max_players: { type: integer, minimum: 3, maximum: 100 }
                per_turn_deadline_seconds: { type: integer, minimum: 5, maximum: 600 }
      responses:
        '201': { description: Game created }
        '400': { description: Invalid parameters }

  /admin/games/{game_id}:
    get: { summary: Per-game admin detail, tags: [admin] }

  /api/admin/games/{game_id}/cancel:
    post: { summary: Cancel a pre-start game, tags: [admin] }

  /api/admin/games/{game_id}/export.csv:
    get: { summary: Per-game CSV export, tags: [admin] }

  /api/admin/games/{game_id}/export.json:
    get: { summary: Per-game JSON export, tags: [admin] }

  /admin/prompts:
    get: { summary: All strategy prompts across games, tags: [admin] }

  # --- Spectator API (public) ---

  /api/games/{game_id}/state:
    get:
      summary: Public game state (no strategy prompts).
      tags: [spectator]
      parameters:
        - { name: game_id, in: path, required: true, schema: { type: string } }
      responses: { '200': { description: JSON } }

  # --- Auth routes ---

  /auth/google/login:
    get: { summary: Start Google OAuth, tags: [auth] }

  /auth/google/callback:
    get: { summary: OAuth callback; sets session cookie, tags: [auth] }

  /auth/logout:
    post: { summary: Clear session cookie, tags: [auth] }

  # --- MCP server ---

  /mcp:
    get:
      summary: Hosted MCP server (HTTP-streamed). Tools (get_turn, submit_action, get_game_state) call our agent API with the X-Agent-Key the client configured.
      tags: [mcp]
      responses: { '200': { description: MCP handshake } }

  # --- Ops ---

  /healthz:
    get: { summary: Liveness probe, tags: [ops], responses: { '200': { description: OK } } }

  /openapi.json:
    get: { summary: Auto-generated OpenAPI spec (FastAPI), tags: [ops] }

components:
  securitySchemes:
    AgentKey:
      type: apiKey
      in: header
      name: X-Agent-Key
