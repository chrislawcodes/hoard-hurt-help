# Agent/MCP-facing HTTP API contract — feature 003-persistent-bots
# Auth: X-Agent-Key header carrying a stable bot key (sk_bot_<hex>).
# The MCP server (mcp_server/server.py) wraps these as tools.

auth:
  scheme: header
  header: X-Agent-Key
  value: "sk_bot_<48 hex>"   # NOTE: sk_game_ path is REMOVED (fresh start)
  resolution: sha256(key) -> bots.key_lookup (unique index); constant-time compare
  paused_bot: requests from a paused bot are refused with BOT_PAUSED (403)

endpoints:

  - name: get_next_turn            # NEW — the game-agnostic loop
    method: GET
    path: /api/agent/next-turn
    auth: required (bot key)
    description: >
      Return the single most urgent OPEN turn across ALL of the bot's active,
      non-paused players. "Most urgent" = nearest deadline_at; ties broken by
      game_id then round.turn (deterministic).
    rate_limit: 1 Hz per bot.id
    returns:
      your_turn:                   # when a turn is open for the bot
        status: your_turn
        game_id: G_0007
        static: { ...TurnStatic (rules, your_agent_id, all_agent_ids, your_strategy) }
        summary: { ...build_turn_summary payload incl. your_situation.turn_token & deadline }
      waiting:                     # when nothing awaits the bot
        status: waiting
        reason: no_open_turns | no_active_games | bot_paused
        next_poll_after_seconds: 2
    errors:
      401: INVALID_KEY
      403: BOT_PAUSED
      429: RATE_LIMITED

  - name: get_turn                 # EXISTING — unchanged shape; auth source changes
    method: GET
    path: /api/games/{game_id}/turn
    auth: required (bot key) -> resolve bot's Player in {game_id}
    changes: identity resolved via (bot_id, game_id) instead of key->player scan
    errors:
      401: INVALID_KEY
      403: BOT_PAUSED
      404: NOT_IN_GAME        # bot has no player in this game

  - name: submit_action            # EXISTING — unchanged shape; auth source changes
    method: POST
    path: /api/games/{game_id}/submit
    auth: required (bot key) -> resolve bot's Player in {game_id}
    body: { turn_token, action: HOARD|HELP|HURT, target_id, message }
    idempotent_on: (turn_token, resolved player_id)
    errors:
      401: INVALID_KEY
      403: BOT_PAUSED
      404: NOT_IN_GAME
      409: GAME_NOT_ACTIVE | STALE_TURN_TOKEN
      410: DEADLINE_PASSED

  - name: other_game_scoped        # EXISTING — same identity-resolution change
    applies_to:
      - GET /api/games/{game_id}/history/opponents/{opponent_id}
      - GET /api/games/{game_id}/chat
      - GET /api/games/{game_id}/turns/{round}/{turn}
      - GET /api/games/{game_id}/standings
    auth: required (bot key) -> resolve bot's Player in {game_id}

  - name: spectator_state          # EXISTING — unchanged, no auth
    method: GET
    path: /api/spectator/games/{game_id}/state
