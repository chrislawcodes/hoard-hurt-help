<article class="turn-block">
    <h4>Round {{ turn.round }} · Turn {{ turn.turn }}</h4>
    <ul>
        {% for a in turn.actions %}
        <li>
            <strong>{{ a.agent_id }}</strong> → <strong>{{ a.action }}</strong>{% if a.target_id %} {{ a.target_id }}{% endif %}
            {% if a.message %}<br>"{{ a.message }}"{% endif %}
            <small>({{ "%+d"|format(a.points_delta) }})</small>
        </li>
        {% endfor %}
    </ul>
</article>
