<style>
/* Scoped to .rc- so it never collides with the main viewer's .feed/.stage. */
.rc-wrap{max-width:920px;margin:0 auto 2rem}
.rc-card{background:var(--surface,#fff);border:1px solid var(--line,#e2e6ea);border-radius:10px;overflow:hidden}
.rc-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line,#e2e6ea)}
.rc-title{display:flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft,#5b6470);font-weight:700}
.rc-livedot{width:8px;height:8px;border-radius:50%;background:#c0392b;animation:rc-pulse 1.6s infinite}
@keyframes rc-pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}70%{box-shadow:0 0 0 7px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
.rc-turnlabel{font-size:13px;color:var(--ink-soft,#5b6470);font-variant-numeric:tabular-nums}

.rc-stage{position:relative;height:580px;background:radial-gradient(68% 68% at 50% 50%, var(--surface,#fff) 0%, var(--surface-2,#eef1f5) 70%, var(--bg,#e6eaef) 100%)}
.rc-ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border:1.5px dashed var(--line,#d4dae1);border-radius:50%}
.rc-fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:6}

.rc-bot{position:absolute;transform:translate(-50%,-50%);z-index:2;transition:opacity .35s ease, filter .35s ease}
.rc-bot.dim{opacity:.30;filter:saturate(.5)}
.rc-bot.lit{z-index:8}
.rc-mover{display:flex;flex-direction:column;align-items:center;gap:3px;will-change:transform}
.rc-name{font-size:10px;color:var(--ink-soft,#5b6470);max-width:74px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.rc-bot.lit .rc-name{color:var(--ink,#1a1d21);font-weight:700}

.rc-body{transition:transform .3s ease;transform-origin:center}
.rc-bot.act-hoard .rc-body{animation:rc-squash .5s ease}
@keyframes rc-squash{40%{transform:translateY(3px) scaleY(.94)}100%{transform:none}}
/* amber "banked" pulse, fired as the caught coin sinks into the chest */
.rc-bot.act-hoard .torso{animation:rc-bank .5s ease .4s both}
@keyframes rc-bank{0%{box-shadow:0 0 0 0 var(--hoard,#b07e0d)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
/* arms reach up to catch the spinning coin, then bring it in to the chest */
.rc-bot.act-hoard .rc-robot .arm.l{animation:rc-catchL .72s ease}
.rc-bot.act-hoard .rc-robot .arm.r{animation:rc-catchR .72s ease}
@keyframes rc-catchL{0%,100%{transform:none}35%{transform:translate(2px,-12px) rotate(-42deg)}68%{transform:translate(1px,-3px) rotate(-16deg)}}
@keyframes rc-catchR{0%,100%{transform:none}35%{transform:translate(-2px,-12px) rotate(42deg)}68%{transform:translate(-1px,-3px) rotate(16deg)}}
.rc-bot.recoil .rc-body{animation:rc-recoil .55s ease}
@keyframes rc-recoil{20%{transform:translateX(-6px) rotate(-10deg)}45%{transform:translateX(5px) rotate(5deg)}100%{transform:none}}
/* red hit-flash on the struck bot — tinting the character reads as "damage" */
.rc-bot.hit .rc-robot{animation:rc-hitflash .42s ease}
@keyframes rc-hitflash{0%,100%{filter:none}25%{filter:drop-shadow(0 0 7px var(--hurt,#c0392b)) saturate(1.5) brightness(1.12)}}
.rc-bot.betray .rc-body{animation:rc-turnback .6s ease}
@keyframes rc-turnback{30%{transform:rotateY(180deg)}60%{transform:rotateY(180deg)}100%{transform:none}}

.rc-robot{width:44px;height:52px;position:relative}
.rc-robot .ant{position:absolute;top:-8px;left:50%;width:2.5px;height:9px;background:var(--ink-soft,#9aa6b6);transform:translateX(-50%)}
.rc-robot .ant:after{content:"";position:absolute;top:-4px;left:50%;width:7px;height:7px;border-radius:50%;background:var(--c);transform:translateX(-50%)}
.rc-robot .head{width:36px;height:28px;border-radius:9px;background:var(--surface,#fff);border:3px solid var(--c);margin:0 auto;display:flex;align-items:center;justify-content:center;gap:5px}
.rc-robot .eye{width:7px;height:7px;border-radius:50%;background:var(--c)}
.rc-robot .torso{width:28px;height:18px;border-radius:6px;background:var(--c);margin:3px auto 0;position:relative}
.rc-robot .arm{position:absolute;top:34px;width:9px;height:3.5px;border-radius:2px;background:var(--c)}
.rc-robot .arm.l{left:0}.rc-robot .arm.r{right:0}

/* --- Identity kit: silhouette varies per bot (head, eyes, antennae, torso) --- */
/* head shapes — kept clearly distinct so a bot is known by shape, not just colour */
.rc-robot.rc-h1 .head{width:30px;height:34px;border-radius:8px}
.rc-robot.rc-h2 .head{width:43px;height:23px;border-radius:12px}
.rc-robot.rc-h3 .head{width:37px;height:30px;border-radius:17px 17px 7px 7px}
/* eyes: always a pair so every expression reads; identity varies by SIZE +
   SPACING (es0 small/close, es1 medium=default, es2 large/wide) */
.rc-robot .eye{transition:transform .12s ease;transform-origin:center}
.rc-robot.rc-es0 .head{gap:4px}
.rc-robot.rc-es0 .eye{width:6px;height:6px}
.rc-robot.rc-es2 .head{gap:9px}
.rc-robot.rc-es2 .eye{width:8.5px;height:8.5px}
/* antennae: default single centre; duo on the sides; none */
.rc-robot .ant.l,.rc-robot .ant.r{display:none}
.rc-robot .ant.l{left:33%}.rc-robot .ant.r{left:67%}
.rc-robot.rc-a1 .ant.c{display:none}
.rc-robot.rc-a1 .ant.l,.rc-robot.rc-a1 .ant.r{display:block}
.rc-robot.rc-a2 .ant.c{display:none}
/* torso details: plain, belt, button */
.rc-robot.rc-t1 .torso::after{content:'';position:absolute;left:3px;right:3px;top:50%;height:2.5px;background:var(--surface,#fff);opacity:.55;transform:translateY(-50%)}
.rc-robot.rc-t2 .torso::after{content:'';position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;background:var(--surface,#fff);opacity:.6;transform:translate(-50%,-50%)}
/* eye expressions: blink (idle), wide (hit), mean (swinging), happy (giving) */
.rc-robot.blink .eye{animation:rc-blink .22s ease}
@keyframes rc-blink{0%,100%{transform:scaleY(1)}45%{transform:scaleY(.1)}}
.rc-robot.eyes-wide .eye{transform:scale(1.45)}
.rc-robot.eyes-mean .eye{transform:scaleY(.4)}
/* happy: eyes arch UPWARD (^^) — a downward curve read as sleepy/sad; the arch
   reads cheerful and stays distinct from the mean squint. They "bloom" in. */
.rc-robot.eyes-happy .eye{background:transparent;border-bottom:0;border-top:3px solid var(--c);border-radius:7px 7px 0 0;height:5px;animation:rc-smile .42s ease}
@keyframes rc-smile{0%{transform:translateY(2px) scaleY(.3)}55%{transform:translateY(-1px) scaleY(1.25)}100%{transform:none}}

/* Side-profile robot — swapped in when carrying a gift or bat */
.rc-robot-side{display:none;width:44px;height:52px;position:relative}
.rc-bot.carrying-gift .rc-robot{display:none}
.rc-bot.carrying-gift .rc-robot-side{display:block}
.rc-robot-side .ant-s{position:absolute;top:-7px;left:50%;width:2px;height:8px;background:#9aa6b6;transform:translateX(-50%)}
.rc-robot-side .ant-s::after{content:'';position:absolute;top:-4px;left:50%;width:6px;height:6px;border-radius:50%;background:var(--c);transform:translateX(-50%)}
.rc-robot-side .head-s{width:16px;height:28px;border-radius:6px 9px 9px 6px;background:var(--surface,#fff);border:3px solid var(--c);margin:0 auto;display:flex;align-items:center;justify-content:flex-end;padding-right:1px}
.rc-robot-side .eye-s{width:6px;height:7px;border-radius:50%;background:var(--c)}
.rc-robot-side .torso-s{width:14px;height:17px;border-radius:4px;background:var(--c);margin:3px auto 0;opacity:.9}
.rc-robot-side .arm-s{position:absolute;top:35px;left:calc(50% + 7px);width:16px;height:3px;border-radius:2px;background:var(--c)}
.rc-bot.carrying-gift .rc-carry-wrap{left:calc(50% + 16px);transform:none}
.rc-bot.facing-left .rc-robot-side{transform:scaleX(-1)}
.rc-bot.carrying-gift.facing-left .rc-carry-wrap{left:calc(50% - 30px)}
.rc-bot.carrying-bat .rc-robot{display:none}
.rc-bot.carrying-bat .rc-robot-side{display:block}
.rc-bot.carrying-bat .rc-carry-wrap{top:6px;left:calc(50% + 16px);transform:none}
.rc-bot.carrying-bat.facing-left .rc-carry-wrap{top:6px;left:calc(50% - 30px)}

.rc-coin{position:absolute;left:50%;top:-30px;width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 36% 28%, #fff6cf, #e3a92f);border:2px solid #bd831c;box-shadow:inset 0 0 0 2px rgba(255,255,255,.3),0 2px 3px rgba(120,80,0,.3);transform:translateX(-50%);opacity:0;z-index:5}
.rc-coin::after{content:'';position:absolute;inset:4px;border:1.5px solid rgba(154,102,16,.45);border-radius:50%}
.rc-coin::before{content:'\2605';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(154,102,16,.6);line-height:1}
/* Hoard: a big token coin spins down (the flip sells "coin"), the bot catches it
   to its chest, then it sinks in as the amber bank pulse fires. */
.rc-bot.act-hoard .rc-coin{animation:rc-coinin .72s ease forwards}
@keyframes rc-coinin{
  0%  {opacity:0;top:-30px;transform:translateX(-50%) scaleX(1)}
  12% {opacity:1;transform:translateX(-50%) scaleX(.12)}
  24% {transform:translateX(-50%) scaleX(1)}
  38% {transform:translateX(-50%) scaleX(.12)}
  52% {transform:translateX(-50%) scaleX(1)}
  72% {opacity:1;top:-3px;transform:translateX(-50%) scale(1)}
  100%{opacity:0;top:-3px;transform:translateX(-50%) scale(.4)}
}

.rc-delta{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-weight:800;font-size:14px;font-variant-numeric:tabular-nums;opacity:0;white-space:nowrap;z-index:9}
.rc-delta.show{animation:rc-floatup 1.6s ease forwards}
.rc-delta.pos{color:var(--help,#1a8f4c)}.rc-delta.neg{color:var(--hurt,#c0392b)}.rc-delta.zero{color:var(--ink-soft,#5b6470)}
@keyframes rc-floatup{0%{opacity:0;top:-8px}25%{opacity:1}100%{opacity:0;top:-34px}}
.rc-tag{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:1px 5px;border-radius:999px;white-space:nowrap;z-index:9;opacity:0}
.rc-tag.show{opacity:1;transition:opacity .3s}
.rc-tag.betrayal{background:#fbe3df;color:#c0392b;border:1px solid #f0b8af}
.rc-tag.mutual{background:#e0f3e8;color:#1a8f4c;border:1px solid #b6e0c6}
.rc-tag.missed{background:#eef1f5;color:var(--ink-soft,#5b6470);border:1px solid var(--line,#e2e6ea)}

/* ---- Speaking animation (talk phase) ---- */
.rc-bot.speaking .rc-body{animation:rc-speakpulse 1.4s ease-in-out infinite}
@keyframes rc-speakpulse{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.06)}}

/* ---- Rolling talk log ---- */
/* Always reserves a fixed-height strip (even when empty) so the card never changes
   height when bots start/stop speaking; the rolling rows clip inside it. */
.rc-tele{display:flex;flex-direction:column;height:104px;border-top:1px solid var(--line,#e2e6ea);background:var(--surface-2,#f6f8fa);overflow:hidden}
.rc-tele-rows{display:flex;flex-direction:column}
.rc-trow{display:flex;align-items:baseline;gap:9px;padding:7px 14px;transition:opacity .35s ease,transform .35s ease;animation:rc-tslide .28s ease-out}
@keyframes rc-tslide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.rc-trow.fading{opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .2s ease}
.rc-trow .tdot{width:9px;height:9px;border-radius:50%;background:var(--c,#888);flex:none;margin-top:5px;min-width:9px}
.rc-trow .tname{font-weight:700;flex:none;min-width:54px}
.rc-trow .ttext{line-height:1.38;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
.rc-tele-rows .rc-trow:nth-child(1) .tname{font-size:14px;color:var(--ink,#1a1d21)}
.rc-tele-rows .rc-trow:nth-child(1) .ttext{font-size:14px;color:var(--ink,#1a1d21);-webkit-line-clamp:3}
.rc-tele-rows .rc-trow:nth-child(2) .tname{font-size:12.5px;color:var(--ink-soft,#5b6470)}
.rc-tele-rows .rc-trow:nth-child(2) .ttext{font-size:12.5px;color:var(--ink-soft,#5b6470);-webkit-line-clamp:2}
.rc-tele-rows .rc-trow:nth-child(2){opacity:.65}
.rc-tele-rows .rc-trow:nth-child(3) .tname{font-size:11px;color:var(--ink-soft,#5b6470)}
.rc-tele-rows .rc-trow:nth-child(3) .ttext{font-size:11px;color:var(--ink-soft,#5b6470);-webkit-line-clamp:1}
.rc-tele-rows .rc-trow:nth-child(3){opacity:.35}
.rc-trow.pinned .tname,.rc-trow.pinned .ttext{color:var(--ink,#1a1d21) !important;font-size:14px !important}
.rc-trow.pinned{opacity:1 !important}
.rc-trow.muted{opacity:.2 !important}
.rc-tele-div{height:1px;background:var(--line,#e2e6ea);display:none}
.rc-tele-div.show{display:block}
@media (prefers-reduced-motion:reduce){.rc-trow{animation:none}.rc-bot.speaking .rc-body{animation:none}}

.rc-caption{padding:12px 14px;border-top:1px solid var(--line,#e2e6ea);font-size:14px;height:60px;overflow:hidden;display:flex;align-items:center;gap:8px}
.rc-badge{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:999px;background:#eef1f5;color:var(--ink-soft,#5b6470);flex:none}

.rc-controls{display:flex;align-items:center;gap:8px;margin:14px 0 0;flex-wrap:wrap}
.rc-controls .spacer{flex:1}
.rc-speed{display:inline-flex;border:1px solid var(--line,#e2e6ea);border-radius:20px;overflow:hidden}
.rc-speed-btn{background:transparent;border:0;border-left:1px solid var(--line,#e2e6ea);cursor:pointer;font-weight:700;font-size:12px;padding:5px 9px;color:var(--ink-soft,#5b6470)}
.rc-speed-btn:first-child{border-left:0}
.rc-speed-btn:hover{color:var(--accent,#2f6feb)}
.rc-speed-btn.is-active{background:var(--accent,#2f6feb);color:#fff}
.rc-skiptalk{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--ink-soft,#5b6470);cursor:pointer}
.rc-legend{display:flex;gap:14px;font-size:12px;color:var(--ink-soft,#5b6470);margin-top:10px;flex-wrap:wrap}
.rc-sw{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:4px}

/* Score aura — soft glow ring behind each bot reflecting in-round score */
.rc-aura{position:absolute;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;z-index:1;transition:width .6s ease,height .6s ease,opacity .6s ease,box-shadow .6s ease}
/* Seat ghost — faint home-position marker so the ring reads as a circuit board */
.rc-seat{position:absolute;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;border:1.5px dashed var(--line,#d4dae1);opacity:.3;pointer-events:none;z-index:1}
/* Turn progress dots — bottom of stage, current round only */
.rc-progress{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:80%}
.rc-pdot{width:7px;height:7px;border-radius:50%;background:var(--line,#d4dae1);transition:background .3s ease,transform .3s ease,box-shadow .3s ease;flex:none}
.rc-pdot.is-done{background:var(--ink-soft,#9aa6b6)}
.rc-pdot.is-cur{background:var(--accent,#2f6feb);transform:scale(1.4);box-shadow:0 0 4px var(--accent,#2f6feb)}

@media (max-width:560px){.rc-stage{height:380px}.rc-robot{width:38px;height:46px}.rc-robot .head{width:30px;height:24px}}

/* The standings rail is a SEPARATE component (fragments/robot_circle_standings.html)
   so a page can place it anywhere, or leave it out. This viewer's JS fills #rc-rail
   only when that component is present on the page. */

/* Carry items */
.rc-carry-wrap{position:absolute;top:30px;left:50%;transform:translateX(-50%);pointer-events:none;transition:top .15s ease,left .15s ease}
.rc-carry-gift,.rc-carry-bat{display:none}
/* CSS baseball bat */
.rc-batbox{display:flex;flex-direction:column;align-items:center}
.rc-batbox{filter:drop-shadow(0 1px 1px rgba(0,0,0,.28))}
.rc-bat-barrel{width:10px;height:17px;background:linear-gradient(90deg,#a06640,#7a4a2c);border-radius:4px 4px 1px 1px}
.rc-bat-handle{width:4px;height:23px;background:#8B5532;border-radius:1px;position:relative}
.rc-bat-handle::after{content:'';position:absolute;bottom:-4px;left:-1px;width:6px;height:5px;background:#8B5532;border-radius:0 0 3px 3px}
.rc-bot.carrying-bat .rc-batbox{transform:rotate(30deg);transform-origin:50% 80%}
.rc-bot.carrying-bat.facing-left .rc-batbox{transform:rotate(-30deg);transform-origin:50% 80%}
.rc-bot.turning-bat .rc-batbox{transform:rotate(0deg);transform-origin:50% 80%}
.rc-bot.turning-bat.facing-left .rc-batbox{transform:rotate(0deg);transform-origin:50% 80%}
.rc-bot.carrying-gift .rc-carry-gift{display:block}
.rc-bot.carrying-bat .rc-carry-bat{display:block}

/* Gift box */
.rc-giftbox{width:22px;height:16px;background:var(--help,#1a8f4c);border-radius:0 0 3px 3px;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.22);
  background-image:linear-gradient(to right,transparent 8px,rgba(255,255,255,.65) 8px,rgba(255,255,255,.65) 14px,transparent 14px)}
.rc-giftbox::before{content:'';position:absolute;left:0;right:0;top:5px;height:3px;background:rgba(255,255,255,.42)}
.rc-giftlid{position:absolute;top:-5px;left:-2px;right:-2px;height:6px;background:var(--help,#1a8f4c);border-radius:2px 2px 0 0;box-shadow:inset 0 0 0 40px rgba(0,0,0,.16);
  background-image:linear-gradient(to right,transparent 6px,rgba(255,255,255,.62) 6px,rgba(255,255,255,.62) 12px,transparent 12px)}
.rc-giftlid::before,.rc-giftlid::after{content:'';position:absolute;top:-6px;width:6px;height:6px;border-radius:50%;background:var(--help,#1a8f4c);border:1px solid rgba(0,0,0,.28)}
.rc-giftlid::before{left:1px}
.rc-giftlid::after{right:1px}

/* Pickup phases */
.rc-bot.turning-gift .rc-body,.rc-bot.turning-bat .rc-body{animation:rc-turn-away .2s ease-in forwards}
@keyframes rc-turn-away{from{transform:scaleX(1)}to{transform:scaleX(.05)}}
.rc-bot.turning-gift .rc-carry-gift,.rc-bot.grabbing-gift .rc-carry-gift{display:block}
.rc-bot.turning-bat .rc-carry-bat,.rc-bot.grabbing-bat .rc-carry-bat{display:block}
.rc-bot.turning-gift .rc-carry-wrap,.rc-bot.turning-bat .rc-carry-wrap,
.rc-bot.grabbing-gift .rc-carry-wrap,.rc-bot.grabbing-bat .rc-carry-wrap
  {top:52px;left:calc(50% - 18px);transform:none}
.rc-bot.turning-gift.facing-left .rc-carry-wrap,.rc-bot.turning-bat.facing-left .rc-carry-wrap,
.rc-bot.grabbing-gift.facing-left .rc-carry-wrap,.rc-bot.grabbing-bat.facing-left .rc-carry-wrap
  {left:calc(50% + 18px)}
/* bat stands vertical on a stand, set off to the side OPPOSITE the bot's travel
   direction (bot travels toward its target — right by default, left when facing-left),
   so the bot walks up to it, grabs the handle, and flips it up onto the shoulder */
.rc-bot.turning-bat .rc-carry-wrap,.rc-bot.grabbing-bat .rc-carry-wrap{top:20px;left:calc(50% - 22px)}
.rc-bot.turning-bat.facing-left .rc-carry-wrap,.rc-bot.grabbing-bat.facing-left .rc-carry-wrap{left:calc(50% + 22px)}
/* The prop rides the hands: it rests on the floor while the bot bends down, then
   lifts up with the body as it stands back up (synced to rc-grab-bend's rise). */
.rc-bot.grabbing-gift .rc-carry-wrap{animation:rc-lift .5s ease-in-out forwards}
@keyframes rc-lift{
  0%,20%{top:52px}
  48%{top:60px}
  72%{top:20px}
  100%{top:30px}
}
/* bat stays still while bot bends to grab the handle (0-48%), then bot stands
   and flips the bat from vertical up onto the shoulder (48-100%) */
.rc-bot.grabbing-bat .rc-carry-wrap{animation:rc-bat-lift .5s ease-in-out forwards}
@keyframes rc-bat-lift{
  0%,48%{top:20px;left:calc(50% - 22px)}
  72%{top:6px;left:calc(50% + 2px)}
  100%{top:6px;left:calc(50% + 16px)}
}
.rc-bot.grabbing-bat.facing-left .rc-carry-wrap{animation:rc-bat-lift-l .5s ease-in-out forwards}
@keyframes rc-bat-lift-l{
  0%,48%{top:20px;left:calc(50% + 22px)}
  72%{top:6px;left:calc(50% - 6px)}
  100%{top:6px;left:calc(50% - 30px)}
}
/* vertical at rest, flips to shoulder angle as bot stands */
.rc-bot.grabbing-bat .rc-batbox{animation:rc-bat-rot .5s ease-in-out forwards;transform-origin:50% 80%}
@keyframes rc-bat-rot{0%,48%{transform:rotate(0deg)}100%{transform:rotate(30deg)}}
.rc-bot.grabbing-bat.facing-left .rc-batbox{animation:rc-bat-rot-l .5s ease-in-out forwards;transform-origin:50% 80%}
@keyframes rc-bat-rot-l{0%,48%{transform:rotate(0deg)}100%{transform:rotate(-30deg)}}
.rc-bot.grabbing-gift .rc-robot,.rc-bot.grabbing-bat .rc-robot{display:none}
.rc-bot.grabbing-gift .rc-robot-side,.rc-bot.grabbing-bat .rc-robot-side{display:block}
.rc-bot.grabbing-gift .rc-robot-side,.rc-bot.grabbing-bat .rc-robot-side{transform:scaleX(-1)}
.rc-bot.grabbing-gift.facing-left .rc-robot-side,.rc-bot.grabbing-bat.facing-left .rc-robot-side{transform:none}
.rc-bot.grabbing-gift .rc-body{animation:rc-grab-bend .5s ease-in-out forwards}
@keyframes rc-grab-bend{
  0%  {transform:scaleX(.05)}
  20% {transform:scaleX(1)}
  48% {transform:translateY(25px) scaleX(1) scaleY(.5)}
  72% {transform:translateY(-6px) scaleX(1) scaleY(1.1)}
  87% {transform:scaleX(1)}
  100%{transform:scaleX(.05)}
}
/* bat grab leans the bot toward the bat (set off to the side) to reach the handle,
   then returns to center as it stands and flips the bat onto the shoulder */
.rc-bot.grabbing-bat .rc-body{animation:rc-grab-bend-bat .5s ease-in-out forwards}
@keyframes rc-grab-bend-bat{
  0%  {transform:scaleX(.05)}
  20% {transform:scaleX(1)}
  48% {transform:translateX(-15px) translateY(25px) scaleX(1) scaleY(.5)}
  72% {transform:translateX(0) translateY(-6px) scaleX(1) scaleY(1.1)}
  87% {transform:scaleX(1)}
  100%{transform:scaleX(.05)}
}
.rc-bot.grabbing-bat.facing-left .rc-body{animation:rc-grab-bend-bat-l .5s ease-in-out forwards}
@keyframes rc-grab-bend-bat-l{
  0%  {transform:scaleX(.05)}
  20% {transform:scaleX(1)}
  48% {transform:translateX(15px) translateY(25px) scaleX(1) scaleY(.5)}
  72% {transform:translateX(0) translateY(-6px) scaleX(1) scaleY(1.1)}
  87% {transform:scaleX(1)}
  100%{transform:scaleX(.05)}
}
.rc-bot.carry-expand .rc-body{animation:rc-carry-expand .15s ease-out}
@keyframes rc-carry-expand{from{transform:scaleX(.05)}to{transform:none}}
/* compact mode (hero): smaller stage, no feed/legend, full-bleed card */
.rc-wrap.rc-compact{margin:0;max-width:none}
.rc-compact .rc-stage{height:300px}
.rc-compact .rc-legend{display:none}
.rc-compact .rc-card{border-radius:var(--al-radius-lg,14px);box-shadow:var(--al-shadow-soft,0 6px 20px rgba(20,20,40,.08))}
.rc-compact .rc-controls{margin-top:10px}
</style>

<div class="rc-wrap{% if rc_compact|default(false) %} rc-compact{% endif %}">
    <div class="rc-main">
      <div class="rc-card">
        <div class="rc-head">
          <span class="rc-title"><span class="rc-livedot"></span> Animated Replay</span>
          <span class="rc-turnlabel" id="rc-turnlabel">—</span>
        </div>
        <div class="rc-stage" id="rc-stage">
          <div class="rc-ring" id="rc-ring"></div>
          <svg class="rc-fx" id="rc-fx" preserveAspectRatio="none"></svg>
          <div class="rc-progress" id="rc-progress"></div>
        </div>
        <div class="rc-tele" id="rc-tele">
          <div class="rc-tele-rows" id="rc-tele-rows"></div>
          <div class="rc-tele-div" id="rc-tele-div"></div>
        </div>
        <div class="rc-caption" id="rc-caption"><span class="rc-badge">—</span> Press play to watch the turns.</div>
      </div>

      <div class="rc-controls">
        <button type="button" id="rc-prev">‹ Prev</button>
        <button type="button" id="rc-play" class="btn btn-primary">▶ Play</button>
        <button type="button" id="rc-next">Next ›</button>
        <span class="rc-speed" role="group" aria-label="Playback speed">
          <button type="button" class="rc-speed-btn" data-speed="1">1×</button>
          <button type="button" class="rc-speed-btn" data-speed="2">2×</button>
          <button type="button" class="rc-speed-btn is-active" data-speed="3">3×</button>
        </span>
        <label class="rc-skiptalk"><input type="checkbox" id="rc-skiptalk"> Skip talk</label>
        <div class="spacer"></div>
        <button type="button" id="rc-replay">↻ Replay turn</button>
      </div>

      <div class="rc-legend">
        <span><span class="rc-sw" style="background:var(--hoard,#b07e0d)"></span><strong>Hoard</strong> — +2 to yourself</span>
        <span><span class="rc-sw" style="background:var(--hurt,#c0392b)"></span><strong>Hurt</strong> — -4 to another</span>
        <span><span class="rc-sw" style="background:var(--help,#1a8f4c)"></span><strong>Help</strong> — +4 to another; both players get +8 if help each other</span>
      </div>
    </div>
</div>

<script type="application/json" id="rc-data">{{ rc_data | safe }}</script>
<script>
(function(){
  var DATA = JSON.parse(document.getElementById('rc-data').textContent);
  var AGENTS = DATA.agents || [];
  var TURNS = DATA.turns || [];
  TURNS.forEach(function(t){
    var best=null,br=99;
    t.actions.forEach(function(a){
      a._marquee=false;
      var r=(a.betrayal?0:a.mutual?1:a.action==='HURT'?2:a.action==='HELP'?3:4);
      if(r<br){br=r;best=a;}
    });
    if(best) best._marquee=true;
  });
  // Identity hues deliberately avoid the three action colours (amber --hoard,
  // green --help, red --hurt) so a bot's colour never reads as a move. Greens and
  // reds here are shifted to lime/rose, clearly distinct from the action shades.
  // --- Playback speed + skip-talk ---
  // Defined early (before any setTimeout fires, e.g. scheduleBlink during init).
  // A local `setTimeout` shadows the global INSIDE this closure and scales EVERY
  // scheduled delay by `speed` — so the whole choreography, including
  // scheduleNext()'s inter-turn delay, stays in sync at any speed without
  // touching each call site. Durations passed to element.animate() are scaled
  // separately via scaleDur(). Default speed 2 = snappier than the original pace.
  var speed = 3;
  var skipTalk = false;
  var _setTimeout = window.setTimeout.bind(window);
  function setTimeout(fn, delay) { return _setTimeout(fn, Math.round((delay || 0) / speed)); }
  function scaleDur(n) { return Math.round(n / speed); }

  var PALETTE = ['#2f6feb','#9b51e0','#e84e8a','#00a8a8','#7cb342','#5b6470',
                 '#c2185b','#3f51b5','#d11a8a','#0288d1','#6a3fb0','#00897b',
                 '#b0338a','#4527a0','#ef6c91'];
  // --- Bot identity: a stable look (color + silhouette) derived from the agent id.
  //     Kept self-contained so it can be lifted into a shared avatar module when
  //     user-built bots need the same face on their setup/profile pages.
  function rcHash(s){ var h=2166136261; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
  function rcIdentity(id,idx){
    var h=rcHash(id);
    // Overflow (>15 bots): generate in the 178-350 hue band (cyan->blue->pink),
    // which holds no action hue, so even auto colours stay action-safe.
    return { color: idx<PALETTE.length ? PALETTE[idx] : 'hsl('+(178+h%172)+',55%,50%)',
             head:h%4, eyesize:(h>>3)%3, ant:(h>>6)%3, torso:(h>>9)%3 };
  }
  var colorOf={}, identOf={};
  AGENTS.forEach(function(id,i){ var it=rcIdentity(id,i); identOf[id]=it; colorOf[id]=it.color; });

  // Effect colors follow the active theme (so strikes/locks read in dark + terminal).
  var THEME=getComputedStyle(document.documentElement);
  function themeColor(n,fb){ var v=(THEME.getPropertyValue(n)||'').trim(); return v||fb; }
  var C_HURT=themeColor('--hurt','#c0392b'), C_HELP=themeColor('--help','#1a8f4c');
  function hexRgba(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}

  var stage=document.getElementById('rc-stage'), fx=document.getElementById('rc-fx'), ring=document.getElementById('rc-ring');
  var caption=document.getElementById('rc-caption'), turnlabel=document.getElementById('rc-turnlabel');
  var railEl=document.getElementById('rc-rail');
  var teleEl=document.getElementById('rc-tele');
  var teleRowsEl=document.getElementById('rc-tele-rows');
  var teleDivEl=document.getElementById('rc-tele-div');

  if(!TURNS.length){
    caption.innerHTML='<span class="rc-badge">Empty</span> No resolved turns yet.';
    return;
  }

  // Per-turn in-round score at the START of each turn, plus cumulative round
  // wins. The winner of a game is decided by rounds won (highest in-round
  // score when a round ends; ties split the win), so the rail tracks that —
  // the in-round score is shown underneath as live context and resets each round.
  var scoreAt=[], winsAt=[], finalWins={}, finalScore={};
  (function(){
    var lastIdxOfRound={};
    TURNS.forEach(function(t,i){ lastIdxOfRound[t.round]=i; });

    var sim={}, simRound=0, wins={};
    AGENTS.forEach(function(id){ sim[id]=0; wins[id]=0; });
    TURNS.forEach(function(t,i){
      if(t.round!==simRound){ simRound=t.round; AGENTS.forEach(function(id){ sim[id]=0; }); }
      var snap={}; AGENTS.forEach(function(id){ snap[id]=sim[id]; }); scoreAt[i]=snap;
      // Wins as of the start of this turn (rounds credited once they finish).
      var wsnap={}; AGENTS.forEach(function(id){ wsnap[id]=wins[id]; }); winsAt[i]=wsnap;
      t.actions.forEach(function(a){
        if(a.action==='HOARD')                        { sim[a.agent]=(sim[a.agent]||0)+2; }
        else if(a.action==='HELP'&&a.mutual)          { sim[a.agent]=(sim[a.agent]||0)+8; }
        else if(a.action==='HELP'&&!a.mutual&&a.target){ sim[a.target]=(sim[a.target]||0)+4; }
        else if(a.action==='HURT'&&a.target)          { sim[a.target]=Math.max(0,(sim[a.target]||0)-4); }
      });
      // Round just ended → award the round win (split evenly on a tie).
      if(lastIdxOfRound[t.round]===i){
        var best=-Infinity;
        AGENTS.forEach(function(id){ if(sim[id]>best) best=sim[id]; });
        var winners=AGENTS.filter(function(id){ return sim[id]===best; });
        var share=1/winners.length;
        winners.forEach(function(id){ wins[id]=(wins[id]||0)+share; });
      }
    });
    AGENTS.forEach(function(id){ finalWins[id]=wins[id]; finalScore[id]=sim[id]||0; });
  })();

  // Format a (possibly fractional) round count: 0, 1, 1.5 — never "1.0".
  function fmtWins(w){ return (Math.round(w*10)/10).toString(); }
  function fmtWinsUnit(w){ return (Math.round(w*10)/10) === 1 ? 'round' : 'rounds'; }

  var rScore={}, rWins={}, railRowEl={};
  var drawnPactArcs={};
  var auraEls={}, seatEls={};
  AGENTS.forEach(function(id){ rScore[id]=0; rWins[id]=0; });

  function buildRail(){
    if(!railEl) return;  // standings component not on this page — skip the rail
    railEl.innerHTML='';
    AGENTS.forEach(function(id){
      var li=document.createElement('li');
      li.className='rc-rail-row'; li.style.setProperty('--c', colorOf[id]);
      li.innerHTML='<span class="rk">1</span>'
        +'<span class="nm"><span class="nm-name" title="'+id+'">'+id+'</span>'
        +'<span class="nm-pts">0 pts this round</span></span>'
        +'<span class="sc">0<span class="sc-unit">rounds</span></span>'
        +'<span class="track"><span class="bar"></span></span>';
      railEl.appendChild(li); railRowEl[id]=li;
    });
    railEl.style.height=(AGENTS.length*52)+'px';
  }

  function updateRail(){
    if(!railEl) return;  // no standings component present
    // Rank by rounds won; break ties by the live in-round score so the rail
    // still reorders within a round before any wins are on the board.
    var maxw=0;
    AGENTS.forEach(function(id){ if(rWins[id]>maxw) maxw=rWins[id]; });
    var order=AGENTS.slice().sort(function(a,b){
      return (rWins[b]-rWins[a]) || (rScore[b]-rScore[a]) || (AGENTS.indexOf(a)-AGENTS.indexOf(b));
    });
    order.forEach(function(id,i){
      var row=railRowEl[id];
      row.style.transform='translateY('+(i*52)+'px)';
      row.querySelector('.rk').textContent=i+1;
      var winsVal=rWins[id]||0;
      row.querySelector('.sc').firstChild.textContent=fmtWins(winsVal);
      row.querySelector('.sc-unit').textContent=fmtWinsUnit(winsVal);
      row.querySelector('.nm-pts').textContent=rScore[id]+' pts this round';
      // Bars show rounds won (what decides the winner); empty until round 1 ends.
      row.querySelector('.bar').style.width=(maxw>0?Math.max(0,Math.min(100,rWins[id]/maxw*100)):0)+'%';
      row.classList.toggle('leader', i===0);
    });
    updateAuras();
  }

  function dmgRail(id){
    var row=railRowEl[id]; if(!row) return;
    row.classList.remove('rc-dmg'); void row.offsetWidth; row.classList.add('rc-dmg');
    setTimeout(function(){ row.classList.remove('rc-dmg'); }, 500);
  }

  function updateAuras(){
    var maxS=0;
    AGENTS.forEach(function(id){ if((rScore[id]||0)>maxS) maxS=rScore[id]; });
    AGENTS.forEach(function(id){
      var a=auraEls[id]; if(!a) return;
      var s=rScore[id]||0;
      var frac=maxS>0 ? s/maxS : 0;
      var sz=Math.round(56+frac*28);
      a.style.width=sz+'px'; a.style.height=sz+'px';
      a.style.opacity=s>0 ? (0.14+frac*0.24).toFixed(2) : '0';
      a.style.background=hexRgba(colorOf[id], 1);
      a.style.boxShadow='0 0 '+(s>0?Math.round(6+frac*18):0)+'px '+hexRgba(colorOf[id],0.55);
    });
  }

  function updateProgress(i){
    var prog=document.getElementById('rc-progress'); if(!prog) return;
    prog.innerHTML='';
    var t=TURNS[i]; if(!t) return;
    var inRound=TURNS.map(function(tt,j){return{j:j,t:tt};}).filter(function(x){return x.t.round===t.round;});
    inRound.forEach(function(x){
      var d=document.createElement('span');
      d.className='rc-pdot'+(x.j<i?' is-done':x.j===i?' is-cur':'');
      prog.appendChild(d);
    });
  }

  // Standings default to the LATEST resolved turn (final wins + the last
  // turn's in-round scores) so a passive watcher always sees current standings,
  // even though the replay itself is cued to the start. Once the user steps
  // through turns, renderTurn() takes over and the rail follows the scrubber.
  function railToLatest(){
    AGENTS.forEach(function(id){ rScore[id]=finalScore[id]||0; rWins[id]=finalWins[id]||0; });
    updateRail();
  }

  buildRail(); updateRail();

  var botEls={};
  AGENTS.forEach(function(id,i){
    var aur=document.createElement('div');
    aur.className='rc-aura'; stage.appendChild(aur); auraEls[id]=aur;
    var seat=document.createElement('div');
    seat.className='rc-seat'; stage.appendChild(seat); seatEls[id]=seat;
    var el=document.createElement('div');
    el.className='rc-bot'; el.dataset.id=id;
    var it=identOf[id];
    el.innerHTML='<div class="rc-mover">'
      +'<div class="rc-delta"></div><div class="rc-tag"></div>'
      +'<div class="rc-carry-wrap">'
      +'<div class="rc-carry-gift"><div class="rc-giftbox"><div class="rc-giftlid"></div></div></div>'
      +'<div class="rc-carry-bat"><div class="rc-batbox"><div class="rc-bat-barrel"></div><div class="rc-bat-handle"></div></div></div>'
      +'</div>'
      +'<div class="rc-body">'
      +'<div class="rc-robot rc-h'+it.head+' rc-es'+it.eyesize+' rc-a'+it.ant+' rc-t'+it.torso+'" style="--c:'+colorOf[id]+'">'
      +'<span class="ant c"></span><span class="ant l"></span><span class="ant r"></span>'
      +'<div class="head"><span class="eye e1"></span><span class="eye e2"></span></div>'
      +'<div class="torso"><span class="rc-coin"></span></div>'
      +'<span class="arm l"></span><span class="arm r"></span>'
      +'</div>'
      +'<div class="rc-robot-side" style="--c:'+colorOf[id]+'">'
      +'<span class="ant-s"></span>'
      +'<div class="head-s"><span class="eye-s"></span></div>'
      +'<div class="torso-s"></div>'
      +'<span class="arm-s"></span>'
      +'</div>'
      +'</div>'
      +'<div class="rc-name" title="'+id+'">'+id+'</div>'
      +'</div>';
    stage.appendChild(el); botEls[id]=el;
  });
  AGENTS.forEach(scheduleBlink);

  function layout(){
    var w=stage.clientWidth, h=stage.clientHeight;
    var cx=w/2, cy=h/2, rad=Math.max(40, Math.min(w,h)/2 - 60);
    ring.style.width=ring.style.height=(rad*2)+'px';
    AGENTS.forEach(function(id,i){
      var ang=-Math.PI/2 + i/AGENTS.length*2*Math.PI;
      var x=cx+rad*Math.cos(ang), y=cy+rad*Math.sin(ang);
      var el=botEls[id];
      el.style.left=x+'px'; el.style.top=y+'px';
      el.dataset.x=x; el.dataset.y=y;
      var aur=auraEls[id]; if(aur){aur.style.left=x+'px';aur.style.top=y+'px';}
      var s=seatEls[id]; if(s){s.style.left=x+'px';s.style.top=y+'px';}
    });
  }

  var NS='http://www.w3.org/2000/svg';
  // Hurt impact: a bold shock ring + radiating spokes at the point of contact.
  // The struck bot itself also red-flashes (see .rc-bot.hit) — tinting the
  // character reads as "damage" far better than an overlay ring at this size.
  function strikeAt(x,y){
    function C(r,sw,fill){
      var c=document.createElementNS(NS,'circle');
      c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);
      c.setAttribute('fill',fill||'none');
      if(sw){c.setAttribute('stroke',C_HURT);c.setAttribute('stroke-width',sw);}
      fx.appendChild(c);return c;
    }
    var f=C(3,0,C_HURT);        // contact pop
    f.animate([{r:3,opacity:.7},{r:18,opacity:0}],{duration:scaleDur(260),fill:'forwards',easing:'ease-out'});
    var s=C(8,6,'none');        // shock ring
    s.animate([{r:8,opacity:1,strokeWidth:6},{r:34,opacity:0,strokeWidth:1}],{duration:scaleDur(460),fill:'forwards',easing:'ease-out'});
    var g=document.createElementNS(NS,'g'); fx.appendChild(g);   // radiating spokes
    g.style.transformBox='view-box'; g.style.transformOrigin=x+'px '+y+'px';
    for(var k=0;k<6;k++){
      var ang=(k/6)*2*Math.PI - Math.PI/2;
      var ln=document.createElementNS(NS,'line');
      ln.setAttribute('x1',x+10*Math.cos(ang));ln.setAttribute('y1',y+10*Math.sin(ang));
      ln.setAttribute('x2',x+30*Math.cos(ang));ln.setAttribute('y2',y+30*Math.sin(ang));
      ln.setAttribute('stroke',C_HURT);ln.setAttribute('stroke-width','3.5');ln.setAttribute('stroke-linecap','round');
      g.appendChild(ln);
    }
    g.animate([{transform:'scale(.45)',opacity:1},{transform:'scale(1.2)',opacity:0}],{duration:scaleDur(380),fill:'forwards',easing:'ease-out'});
    setTimeout(function(){f.remove();s.remove();g.remove();},560);
  }
  function lockRing(x,y){
    var r=document.createElementNS(NS,'circle');
    r.setAttribute('cx',x);r.setAttribute('cy',y);r.setAttribute('r','6');
    r.setAttribute('fill','none');r.setAttribute('stroke',C_HELP);r.setAttribute('stroke-width','3.5');
    fx.appendChild(r);
    r.animate([{r:6,opacity:0},{r:32,opacity:.95},{r:32,opacity:0}],{duration:scaleDur(1100),fill:'forwards'});
    setTimeout(function(){r.remove();},1150);
  }

  var DUR=1520;
  var MAX_TELE_ROWS=3;
  var TALK_STAGGER=1750;
  var PAUSE_AFTER_TALK=750;
  var teleRows=[];

  function talkDurOf(t){ if(skipTalk) return 0; return (t.talk&&t.talk.length?t.talk.length*TALK_STAGGER:0)+PAUSE_AFTER_TALK; }

  function teleAddRow(id,text){
    if(teleRows.length>=MAX_TELE_ROWS){
      var oldest=teleRows.pop();
      oldest.classList.add('fading');
      setTimeout(function(){if(oldest.parentNode)oldest.parentNode.removeChild(oldest);},220);
    }
    var row=document.createElement('div');
    row.className='rc-trow'; row.dataset.agent=id;
    row.style.setProperty('--c',colorOf[id]);
    row.innerHTML='<span class="tdot"></span><span class="tname">'+id+'</span><span class="ttext">'+text+'</span>';
    teleRowsEl.insertBefore(row,teleRowsEl.firstChild);
    teleRows.unshift(row);
  }
  function teleReset(){
    teleRows.forEach(function(r){if(r.parentNode)r.parentNode.removeChild(r);});
    teleRows=[]; teleRowsEl.innerHTML=''; teleDivEl.classList.remove('show');
    // note: the strip stays in the layout (fixed height) — we only clear its rows,
    // so the card height never changes between talking and non-talking phases
  }
  function telePinMarquee(agentId){
    teleRows.forEach(function(r){
      if(r.dataset.agent===agentId){r.classList.add('pinned');r.classList.remove('muted');}
      else{r.classList.add('muted');r.classList.remove('pinned');}
    });
    teleDivEl.classList.add('show');
  }
  function speakLine(a){
    if(!a.text) return;
    AGENTS.forEach(function(id){ if(id!==a.agent) dimDown(id); });
    litUp(a.agent); botEls[a.agent].classList.add('speaking');
    teleAddRow(a.agent,a.text);
  }
  var TURN_DUR=200;
  var BEND_DUR=500;
  var EXPAND_DUR=150;
  var REACH_DUR=TURN_DUR+BEND_DUR+EXPAND_DUR;   // turn, bend-to-grab, expand item
  var REACH_FULL=REACH_DUR+DUR;                  // a whole reach action incl. the walk back
  var HOARD_FULL=950;                            // coin pop + settle
  // Breathing room: phases (help -> pact -> hurt -> hoard) no longer overlap —
  // each waits for the previous to finish — and actions within a phase are
  // staggered so they read as distinct beats instead of all firing at once.
  var PHASE_GAP=600;                             // pause between phase types
  var HELP_STAGGER=REACH_FULL+180;               // helps play one at a time
  var REACH_STAGGER=1150;                        // hurts / separate pacts: slight overlap, distinct impacts
  var HOARD_STAGGER=340;                         // hoards pop in sequence, not a single flash

  var phaseTimers=[];
  function clearPhaseTimers(){ phaseTimers.forEach(clearTimeout); phaseTimers=[]; }
  function phaseOf(a){
    if(a.action==='HOARD') return 'hoard';
    if(a.action==='HURT') return 'hurt';
    return a.mutual ? 'mutual' : 'help';
  }
  function buildSchedule(t){
    var slots=[], cursor=0;
    var helps  =t.actions.filter(function(a){return phaseOf(a)==='help';});
    var mutuals=t.actions.filter(function(a){return phaseOf(a)==='mutual';});
    var hurts  =t.actions.filter(function(a){return phaseOf(a)==='hurt';});
    var hoards =t.actions.filter(function(a){return phaseOf(a)==='hoard';});

    // helps: one gift at a time
    helps.forEach(function(a,i){ slots.push({delay:cursor+i*HELP_STAGGER, actions:[a]}); });
    if(helps.length) cursor += (helps.length-1)*HELP_STAGGER + REACH_FULL + PHASE_GAP;

    // mutuals: each PACT (both halves) fires together so the pair meets in the
    // middle — but separate pacts are staggered so they don't all happen at once.
    if(mutuals.length){
      var pacts=[], byPair={};
      mutuals.forEach(function(a){
        var key=[a.agent,a.target].sort().join('');
        if(!byPair[key]){ byPair[key]=[]; pacts.push(byPair[key]); }
        byPair[key].push(a);
      });
      pacts.forEach(function(g,i){ slots.push({delay:cursor+i*REACH_STAGGER, actions:g}); });
      cursor += (pacts.length-1)*REACH_STAGGER + REACH_FULL + PHASE_GAP;
    }

    // hurts: distinct strikes, slightly overlapped
    hurts.forEach(function(a,i){ slots.push({delay:cursor+i*REACH_STAGGER, actions:[a]}); });
    if(hurts.length) cursor += (hurts.length-1)*REACH_STAGGER + REACH_FULL + PHASE_GAP;

    // hoards: a quick readable run of coin pops, not one simultaneous flash
    hoards.forEach(function(a,i){ slots.push({delay:cursor+i*HOARD_STAGGER, actions:[a]}); });
    if(hoards.length) cursor += (hoards.length-1)*HOARD_STAGGER + HOARD_FULL;

    return {slots:slots, totalDuration:cursor+400};
  }

  function walk(actorEl,toX,toY,onArrive){
    var ax=+actorEl.dataset.x, ay=+actorEl.dataset.y;
    var dx=toX-ax, dy=toY-ay;
    var mover=actorEl.querySelector('.rc-mover');
    mover.animate([
      {transform:'translate(0,0)'},
      {transform:'translate('+dx+'px,'+dy+'px)',offset:.38},
      {transform:'translate('+dx+'px,'+dy+'px)',offset:.64},
      {transform:'translate(0,0)'}
    ],{duration:scaleDur(DUR),easing:'ease-in-out'});
    setTimeout(onArrive, DUR*0.46);
  }

  function renderTurn(i){
    var t=TURNS[i];
    // Broadcast the playhead so the feed + now-strip follow. The seq is 1-based
    // (rc_data.turns are 1:1 with the server's history, whose seq starts at 1).
    // State lives on #live-region (persistent) so it survives SSE feed swaps.
    var _region=document.getElementById('live-region');
    if(_region){
      _region.dataset.rcSeq=String(i+1);
      _region.dispatchEvent(new CustomEvent('rc:turn',{bubbles:true,detail:{seq:i+1,round:t.round,turn:t.turn}}));
    }
    var snap=scoreAt[i]||{};
    // The last turn finishes the final round, so show the fully-credited wins.
    var wsnap=(i===TURNS.length-1)?finalWins:(winsAt[i]||{});
    AGENTS.forEach(function(id){ rScore[id]=snap[id]||0; rWins[id]=wsnap[id]||0; });
    updateRail();
    updateProgress(i);
    turnlabel.textContent='Round '+t.round+' · Turn '+t.turn;
    fx.innerHTML='';
    drawnPactArcs={};
    clearPhaseTimers();
    teleReset();
    Object.keys(botEls).forEach(function(id){
      var el=botEls[id];
      el.className='rc-bot dim';
      el.querySelector('.rc-robot').classList.remove('eyes-happy','eyes-mean','eyes-wide','blink');
      el.querySelector('.rc-delta').className='rc-delta';
      el.querySelector('.rc-tag').className='rc-tag';
      el.querySelector('.rc-mover').getAnimations().forEach(function(a){a.cancel();});
      el.querySelector('.rc-mover').style.transform='';
    });
    var talk=t.talk||[];
    var showTalk=talk.length>0 && !skipTalk;
    if(showTalk){
      caption.innerHTML='<span class="rc-badge">Talk</span>';
      talk.forEach(function(a,k){
        phaseTimers.push(setTimeout(function(){speakLine(a);},k*TALK_STAGGER));
      });
    }

    var talkDur=talkDurOf(t);
    var sched=buildSchedule(t);

    if(showTalk){
      phaseTimers.push(setTimeout(function(){
        AGENTS.forEach(function(id){botEls[id].classList.remove('speaking');dimDown(id);});
        var mq=t.actions.filter(function(a){return a._marquee;})[0];
        if(mq) telePinMarquee(mq.agent);
        caption.innerHTML='<span class="rc-badge">'+t.badge+'</span> '+t.cap;
      },talkDur-60));
    } else {
      caption.innerHTML='<span class="rc-badge">'+t.badge+'</span> '+t.cap;
    }

    requestAnimationFrame(function(){requestAnimationFrame(function(){
      sched.slots.forEach(function(slot){
        phaseTimers.push(setTimeout(function(){
          slot.actions.forEach(playAction);
        }, talkDur+slot.delay));
      });
    });});
  }

  function showDelta(el, val){
    var d=el.querySelector('.rc-delta');
    d.textContent=(val>0?'+':'')+val;
    d.className='rc-delta '+(val>0?'pos':(val<0?'neg':'zero'))+' show';
  }
  function carryItem(el, type){ el.classList.add(type==='gift'?'carrying-gift':'carrying-bat'); }
  function dropCarry(el){ el.classList.remove('carrying-gift','carrying-bat','facing-left'); }
  function litUp(id){ var e=botEls[id]; if(e){ e.classList.remove('dim'); e.classList.add('lit'); } }
  function dimDown(id){ var e=botEls[id]; if(e){ e.classList.remove('lit'); e.classList.add('dim'); } }

  // Eye expression: 'happy' (giving/banking), 'mean' (swinging), 'wide' (getting hit).
  function eyes(id, state, ms){
    var e=botEls[id]; var r=e&&e.querySelector('.rc-robot'); if(!r) return;
    r.classList.remove('eyes-happy','eyes-mean','eyes-wide','blink');
    if(state) r.classList.add('eyes-'+state);
    if(state && ms) setTimeout(function(){ r.classList.remove('eyes-'+state); }, ms);
  }
  // Idle blink — staggered per bot so a crowd never strobes in unison.
  function scheduleBlink(id){
    setTimeout(function(){
      var r=botEls[id]&&botEls[id].querySelector('.rc-robot');
      if(r && r.className.indexOf('eyes-')<0){
        r.classList.add('blink'); setTimeout(function(){ r.classList.remove('blink'); }, 220);
      }
      scheduleBlink(id);
    }, 2600+Math.random()*4200);
  }

  function playAction(a){
    var el=botEls[a.agent]; if(!el) return;
    var tg=el.querySelector('.rc-tag');
    litUp(a.agent);
    if(a.target) litUp(a.target);
    if(a.betrayal){ tg.textContent='betrayal'; tg.classList.add('betrayal','show'); }
    else if(a.mutual){ tg.textContent='mutual'; tg.classList.add('mutual','show'); }
    else if(a.missed){ tg.textContent='\u{1F4A4}'; tg.classList.add('missed','show'); }
    if(a.action==='HOARD'){
      el.classList.add('act-hoard');
      eyes(a.agent,'happy',900);
      showDelta(el, 2);
      rScore[a.agent]=(rScore[a.agent]||0)+2;
      updateRail();
      setTimeout(function(){ dimDown(a.agent); }, 900);
      return;
    }
    var T=botEls[a.target]; if(!T) return;
    var ax=+el.dataset.x, ay=+el.dataset.y, tx=+T.dataset.x, ty=+T.dataset.y;
    if(a.mutual){
      var mx=(ax+tx)/2, my=(ay+ty)/2;
      if(mx<ax) el.classList.add('facing-left');
      el.classList.add('turning-gift');
      setTimeout(function(){ el.classList.remove('turning-gift'); el.classList.add('grabbing-gift'); }, TURN_DUR);
      setTimeout(function(){
        el.classList.remove('grabbing-gift');
        el.classList.add('carry-expand'); carryItem(el,'gift');
        setTimeout(function(){ el.classList.remove('carry-expand'); }, EXPAND_DUR);
      }, TURN_DUR+BEND_DUR);
      setTimeout(function(){
        walk(el, mx, my, function(){
          dropCarry(el);
          lockRing(mx,my);
          var pairKey=[a.agent,a.target].sort().join('|');
          if(!drawnPactArcs[pairKey]){
            drawnPactArcs[pairKey]=true;
            var parc=document.createElementNS(NS,'line');
            parc.setAttribute('x1',ax);parc.setAttribute('y1',ay);
            parc.setAttribute('x2',tx);parc.setAttribute('y2',ty);
            parc.setAttribute('stroke',C_HELP);parc.setAttribute('stroke-width','1.5');
            parc.setAttribute('stroke-dasharray','5 5');parc.setAttribute('opacity','0');
            fx.appendChild(parc);
            parc.animate([{opacity:0},{opacity:.55,offset:.12},{opacity:.55,offset:.82},{opacity:0}],{duration:scaleDur(1400),fill:'forwards'});
            setTimeout(function(){parc.remove();},scaleDur(1400)+20);
          }
          eyes(a.agent,'happy',900); eyes(a.target,'happy',900);
          showDelta(el, 8); showDelta(T, 8);
          rScore[a.agent]=(rScore[a.agent]||0)+8;
          updateRail();
          setTimeout(function(){ dimDown(a.agent); dimDown(a.target); }, 500);
        });
      }, REACH_DUR);
    } else if(a.action==='HELP'){
      var gx=ax+(tx-ax)*0.62, gy=ay+(ty-ay)*0.62;
      if(tx<ax) el.classList.add('facing-left');
      el.classList.add('turning-gift');
      setTimeout(function(){ el.classList.remove('turning-gift'); el.classList.add('grabbing-gift'); }, TURN_DUR);
      setTimeout(function(){
        el.classList.remove('grabbing-gift');
        el.classList.add('carry-expand'); carryItem(el,'gift');
        setTimeout(function(){ el.classList.remove('carry-expand'); }, EXPAND_DUR);
      }, TURN_DUR+BEND_DUR);
      setTimeout(function(){
        walk(el, gx, gy, function(){
          dropCarry(el);
          eyes(a.agent,'happy',900); eyes(a.target,'happy',900);
          showDelta(T, 4);
          rScore[a.target]=(rScore[a.target]||0)+4;
          updateRail();
          setTimeout(function(){ dimDown(a.agent); dimDown(a.target); }, 500);
        });
      }, REACH_DUR);
    } else {
      var hx=ax+(tx-ax)*0.68, hy=ay+(ty-ay)*0.68;
      if(tx<ax) el.classList.add('facing-left');
      el.classList.add('turning-bat');
      eyes(a.agent,'mean', REACH_DUR+DUR);
      if(a.betrayal) el.classList.add('betray');
      setTimeout(function(){ el.classList.remove('turning-bat'); el.classList.add('grabbing-bat'); }, TURN_DUR);
      setTimeout(function(){
        el.classList.remove('grabbing-bat');
        el.classList.add('carry-expand'); carryItem(el,'bat');
        setTimeout(function(){ el.classList.remove('carry-expand'); }, EXPAND_DUR);
      }, TURN_DUR+BEND_DUR);
      setTimeout(function(){
        walk(el, hx, hy, function(){
          dropCarry(el);
          strikeAt(tx,ty);
          eyes(a.target,'wide',800);
          showDelta(T, -4);
          rScore[a.target]=Math.max(0,(rScore[a.target]||0)-4);
          dmgRail(a.target);
          updateRail();
          T.classList.add('recoil','hit');
          setTimeout(function(){ T.classList.remove('recoil','hit'); }, 550);
          setTimeout(function(){ dimDown(a.agent); dimDown(a.target); }, 600);
        });
      }, REACH_DUR);
    }
  }

  var idx=0, playing=false, timer=null, stepped=false;
  function go(i){ stepped=true; idx=(i+TURNS.length)%TURNS.length; renderTurn(idx); }
  function stop(){
    playing=false; clearTimeout(timer);
    var p=document.getElementById('rc-play');
    p.textContent='▶ Play'; p.classList.add('btn-primary');
  }
  function scheduleNext(){
    timer=setTimeout(function(){
      if(idx>=TURNS.length-1){stop();return;}
      go(idx+1);
      scheduleNext();
    }, talkDurOf(TURNS[idx]) + buildSchedule(TURNS[idx]).totalDuration + 400);
  }
  document.getElementById('rc-next').onclick=function(){stop();go(idx+1);};
  document.getElementById('rc-prev').onclick=function(){stop();go(idx-1);};
  document.getElementById('rc-replay').onclick=function(){stepped=true;renderTurn(idx);};
  document.getElementById('rc-play').onclick=function(){
    if(playing){stop();return;}
    stepped=true;
    playing=true; this.textContent='❚❚ Pause'; this.classList.remove('btn-primary');
    renderTurn(idx);
    scheduleNext();
  };
  // Speed + skip-talk take effect from the next scheduled timer (i.e. the next
  // turn / next action), so changing them never cuts off the turn in progress.
  Array.prototype.forEach.call(document.querySelectorAll('.rc-speed-btn'), function(b){
    b.onclick=function(){
      speed=parseInt(b.dataset.speed,10)||1;
      Array.prototype.forEach.call(document.querySelectorAll('.rc-speed-btn'), function(x){
        x.classList.toggle('is-active', x===b);
      });
    };
  });
  var skipEl=document.getElementById('rc-skiptalk');
  if(skipEl) skipEl.onchange=function(){ skipTalk=skipEl.checked; };
  window.addEventListener('resize',function(){layout();renderTurn(idx);});
  layout();
  // The rail follows the playhead (animation is the clock). With reduced motion
  // we don't auto-animate — open at the LATEST turn, paused, so the rail + feed
  // show current standings. Otherwise start at turn 1 and auto-play the story.
  var _reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(_reduced){ idx=TURNS.length-1; }
  renderTurn(idx);
  if({{ 'true' if rc_autoplay|default(false) else 'false' }} && !_reduced){
    setTimeout(function(){ var b=document.getElementById('rc-play'); if(b) b.click(); }, 900);
  }
})();
</script>
