<script>
// Round navigation. Filters the feed to one round at a time so a long game is
// readable. Works for both live and completed games. This script runs once; its
// closure survives the SSE swaps that replace the live region's innerHTML, so
// the selected round persists across turn updates.
(function () {
    const region = document.getElementById('live-region');
    if (!region) return;

    // follow = '1' → the feed tracks the replay's playhead: it shows the round the
    // animation is on, the turns up to the current turn, and marks the current
    // turn. follow = '0' → the reader pinned a round (dataset.pinnedRound) and sees
    // all of it. Clicking the round the replay is on resumes follow. (The cockpit —
    // a human playing, no animation — always shows the whole feed, unfiltered.)
    if (!region.dataset.follow) region.dataset.follow = '1';
    // Feed view: 'story' (one-line play-by-play), 'cards' (full messages), or
    // 'compact' (one line per move). Lives in this closure so it survives the
    // SSE swaps that replace the feed's innerHTML. Cards is the default.
    let view = 'cards';

    function playRound() { return parseInt(region.dataset.rcRound || '0', 10); }
    function playSeq() { return parseInt(region.dataset.rcSeq || '0', 10); }
    function maxRound() {
        let m = 0;
        region.querySelectorAll('#feed .round-section').forEach(function (s) {
            const r = parseInt(s.dataset.round, 10);
            if (r > m) m = r;
        });
        return m;
    }

    function apply() {
        // View mode lives on #live-region — it persists across the SSE innerHTML
        // swaps that replace the inner #feed. Keep the switcher buttons in sync.
        region.classList.remove('view-story', 'view-cards', 'view-compact');
        region.classList.add('view-' + view);
        region.querySelectorAll('#view-switch .view-btn').forEach(function (b) {
            b.setAttribute('aria-pressed', b.dataset.view === view ? 'true' : 'false');
        });

        const max = maxRound();
        if (max === 0) return;  // nothing resolved yet

        // Cockpit (human playing, no animation): show the whole feed, unfiltered.
        if (region.classList.contains('cockpit')) {
            region.querySelectorAll('#feed .round-section').forEach(function (s) { s.hidden = false; });
            return;
        }

        const following = region.dataset.follow !== '0';
        const seq = playSeq();
        // Which round to show: the replay's round while following, else the pinned one.
        const target = following
            ? (playRound() || max)
            : Math.min(parseInt(region.dataset.pinnedRound || String(max), 10), max);

        // Show only the target round.
        region.querySelectorAll('#feed .round-section').forEach(function (s) {
            s.hidden = parseInt(s.dataset.round, 10) !== target;
        });
        // Mark the turn the replay is on; while following, hide the turns after it
        // so the current turn leads the feed (which is newest-first).
        region.querySelectorAll('#feed .turn-block').forEach(function (b) {
            const s = parseInt(b.dataset.seq, 10);
            b.classList.toggle('is-current', seq > 0 && s === seq);
            b.hidden = following && seq > 0 && s > seq;
        });
        // Highlight the active round chip.
        region.querySelectorAll('.round-chip').forEach(function (c) {
            c.classList.toggle('is-active', c.dataset.round === String(target));
        });
    }

    // The replay's playhead drives the feed: round + turn come from rc:turn.
    region.addEventListener('rc:turn', function (e) {
        if (e.detail && e.detail.round != null) region.dataset.rcRound = String(e.detail.round);
        if (e.detail && e.detail.seq != null) region.dataset.rcSeq = String(e.detail.seq);
        apply();
    });

    region.addEventListener('click', function (e) {
        // Reveal/hide a bot's private "thinking" note. Delegated so it survives swaps.
        const tt = e.target.closest('.thinking-toggle');
        if (tt) {
            const thought = tt.parentNode.querySelector('.thought');
            if (thought) {
                const open = thought.hasAttribute('hidden');
                if (open) thought.removeAttribute('hidden'); else thought.setAttribute('hidden', '');
                tt.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            return;
        }
        // Feed view switcher (Story / Cards / Compact).
        const vbtn = e.target.closest('.view-btn');
        if (vbtn) {
            view = vbtn.dataset.view;
            apply();
            return;
        }
        // Round chip: clicking the round the replay is on resumes follow; any
        // other round pins the feed to that round for reading.
        const chip = e.target.closest('.round-chip');
        if (chip && !chip.disabled) {
            const n = parseInt(chip.dataset.round, 10);
            if (n === playRound()) {
                region.dataset.follow = '1';
            } else {
                region.dataset.follow = '0';
                region.dataset.pinnedRound = String(n);
            }
            apply();
            return;
        }
        // Click a turn card → seek the replay to that turn (spectator only; needs
        // the animation stage present). Ignore clicks on inner controls/links.
        const turn = e.target.closest('.turn-block');
        if (turn && document.getElementById('rc-stage') &&
            !e.target.closest('a, button, [data-target-name]')) {
            const s = parseInt(turn.dataset.seq, 10);
            if (s) document.dispatchEvent(new CustomEvent('rc:goto', { detail: { index: s - 1 } }));
        }
    });

    // Keyboard access for click-to-seek: make the turn cards focusable and
    // operable with Enter/Space (mouse already works via the click handler
    // above). Only when a replay exists to seek; re-applied after each SSE swap.
    function markSeekable() {
        if (!document.getElementById('rc-stage')) return;
        region.querySelectorAll('#feed .turn-block').forEach(function (b) {
            b.setAttribute('tabindex', '0');
            const lbl = b.querySelector('.turn-head-label');
            b.setAttribute('aria-label', 'Jump the replay to ' + (lbl ? lbl.textContent.trim() : 'this turn'));
        });
    }
    region.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter' && e.key !== ' ' && e.key !== 'Spacebar') return;
        const turn = e.target.closest ? e.target.closest('.turn-block') : null;
        // Only the card's own focus seeks — inner controls keep their own keys.
        if (!turn || e.target !== turn || !document.getElementById('rc-stage')) return;
        e.preventDefault();
        const s = parseInt(turn.dataset.seq, 10);
        if (s) document.dispatchEvent(new CustomEvent('rc:goto', { detail: { index: s - 1 } }));
    });

    // Re-apply after each SSE-driven swap of the live region.
    region.addEventListener('htmx:afterSwap', function () { apply(); markSeekable(); });

    apply();
    markSeekable();
})();

// Live updates via Server-Sent Events. Plain EventSource — not htmx's sse
// extension, which silently fails to fire hx-trigger against an sse-connect
// source in htmx 1.9.x. On each game event we re-fetch the server-rendered live
// region (htmx.ajax so the round-nav afterSwap handler above still runs). On a
// reconnect we re-fetch too: the in-process pub/sub keeps no backlog, so any
// event missed while the connection was down (sleep, network blip, idle
// timeout) is lost — re-syncing on reconnect heals that instead of going stale.
// Wrapped in DOMContentLoaded so htmx (loaded with `defer`) is ready first.
(function () {
    function init() {
        const region = document.getElementById('live-region');
        if (!region || region.dataset.state !== 'active') return;
        const streamUrl = region.dataset.streamUrl;
        const liveUrl = region.dataset.liveUrl;
        if (!streamUrl || !liveUrl) return;

        let inFlight = false;
        function refresh() {
            if (inFlight) return;  // coalesce the burst of events that arrive together
            inFlight = true;
            htmx.ajax('GET', liveUrl, { target: '#live-region', swap: 'innerHTML' })
                .finally(function () { inFlight = false; });
        }

        const es = new EventSource(streamUrl);
        ['turn_resolved', 'turn_opened', 'turn_talked', 'round_ended', 'game_completed'].forEach(function (name) {
            es.addEventListener(name, refresh);
        });
        // First open is the initial connect (page already has fresh state);
        // every open after that is a reconnect that must re-sync.
        let firstOpen = true;
        es.addEventListener('open', function () {
            if (firstOpen) { firstOpen = false; return; }
            refresh();
        });
        es.addEventListener('game_completed', function () { es.close(); });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

// Feed the replay new turns after each SSE swap. The robot-circle animation is
// rendered once at page load and sits outside #live-region, so its own turn list
// never refreshes. Each /live swap embeds fresh replay JSON (#rc-data-live); we
// read it here and hand the turns to the animation via a bubbling `rc:extend`
// event, so an already-open page keeps advancing instead of freezing at the turn
// count it loaded with.
(function () {
    const region = document.getElementById('live-region');
    if (!region) return;
    function pushTurns() {
        const el = document.getElementById('rc-data-live');
        if (!el) return;
        let data;
        try { data = JSON.parse(el.textContent); }
        catch (e) { return; }  // malformed blob: skip this swap, the next one heals it
        if (!data || !Array.isArray(data.turns)) return;
        document.dispatchEvent(new CustomEvent('rc:extend', { detail: { turns: data.turns } }));
    }
    region.addEventListener('htmx:afterSwap', pushTurns);
})();
</script>
