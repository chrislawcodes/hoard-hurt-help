<h3>Scoreboard</h3>
<table class="score-table">
    <tr><th></th><th>Agent</th><th>Score</th><th>Wins</th></tr>
    {% for row in scoreboard %}
    <tr class="{{ 'leader' if row.rank == 1 else '' }}">
        <td class="rank">{{ row.rank }}</td>
        <td>{{ row.agent_id }}</td>
        <td>{{ row.round_score }}</td>
        <td>{{ "%.2f" | format(row.round_wins) }}</td>
    </tr>
    {% endfor %}
</table>
<p class="hint">Score resets each round. Wins = rounds taken.</p>
