<h3>Scoreboard</h3>
<table>
    <tr><th>Agent</th><th>Round score</th><th>Round wins</th></tr>
    {% for row in scoreboard %}
    <tr>
        <td>{{ row.agent_id }}</td>
        <td>{{ row.round_score }}</td>
        <td>{{ "%.2f"|format(row.round_wins) }}</td>
    </tr>
    {% endfor %}
</table>
