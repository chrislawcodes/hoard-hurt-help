<p>
    State: <strong>{{ game.state.value }}</strong>
    {% if game.state.value == "active" %}
        · Round {{ game.current_round }} / {{ game.total_rounds }}
        · Turn {{ game.current_turn }} / {{ game.turns_per_round }}
    {% elif game.state.value == "completed" %}
        · Winner: <strong>{{ winner_agent_id or "—" }}</strong>
    {% endif %}
</p>
