{% extends "base.html" %}
{% block title %}Create Match — {{ game_slug }} Admin{% endblock %}
{% block content %}
<div class="page-head"><h1>Create match</h1></div>

<form method="post" action="/games/{{ game_slug }}/admin/matches/new" id="create-game-form" class="card form">
    <label>
        Match name
        <input type="text" name="name" required maxlength="255" placeholder="Friday Night Fights">
    </label>

    <label>
        Scheduled start
        <input type="datetime-local" id="start-local" required>
    </label>
    <p class="hint" id="tz-note"></p>
    <input type="hidden" name="scheduled_start" id="start-iso">

    <div class="form-row">
        <label>
            Min players
            <input type="number" name="min_players" value="{{ defaults.min_players }}" min="{{ defaults.min_players }}" max="{{ defaults.max_players }}">
        </label>
        <label>
            Max players
            <input type="number" name="max_players" value="{{ defaults.max_players }}" min="{{ defaults.min_players }}" max="{{ defaults.max_players }}">
        </label>
        <label>
            Per-turn deadline (sec)
            <input type="number" name="per_turn_deadline_seconds" value="{{ defaults.per_turn_deadline_seconds }}" min="5" max="600">
        </label>
    </div>
    <div class="form-row">
        <label>
            Total rounds
            <input type="number" name="total_rounds" value="{{ defaults.total_rounds }}" min="3" max="20">
        </label>
        <label>
            Turns per round
            <input type="number" name="turns_per_round" value="{{ defaults.turns_per_round }}" min="3" max="20">
        </label>
    </div>

    {% if game_slug == "liars-dice" %}
    <div class="form-row">
        <label>
            <input type="checkbox" name="wild_ones" checked>
            Wild ones
        </label>
        <label>
            Dice per player
            <input type="number" name="dice_per_player" value="5" min="1" max="20">
        </label>
    </div>
    {% endif %}

    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <div class="form-actions"><button type="submit" class="btn btn-primary">Create match</button></div>
</form>

<script>
(function () {
    const local = document.getElementById('start-local');
    const iso = document.getElementById('start-iso');
    const tzNote = document.getElementById('tz-note');
    const form = document.getElementById('create-game-form');

    const pad = n => String(n).padStart(2, '0');
    const toLocalInputValue = d =>
        d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
        + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());

    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    tzNote.textContent = 'Enter the time in your local timezone (' + tz + '). Stored as UTC.';

    const now = new Date();
    local.min = toLocalInputValue(now);
    if (!local.value) {
        local.value = toLocalInputValue(new Date(now.getTime() + 10 * 60 * 1000));
    }

    form.addEventListener('submit', function () {
        if (local.value) iso.value = new Date(local.value).toISOString();
    });
})();
</script>
{% endblock %}
